name: Ingest Unit 1 Media

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch that receives generated media shards
        required: true
        default: media-ingestion/unit1
  push:
    branches:
      - media-ingestion/unit1
    paths:
      - .github/media-ingestion-trigger/**
  pull_request:
    types: [opened]
    paths:
      - .github/media-ingestion-trigger/**

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out ingestion branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Extract and shard Unit 1 document media
        run: python3 tools/ingest_unit1_media.py

      - name: Verify generated shards
        run: python3 tools/verify_vendor_media.py

      - name: Commit generated media
        env:
          TARGET_BRANCH: ${{ github.head_ref || inputs.target_branch || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media/vendor/unit1-document-media
          if ! git diff --cached --quiet; then
            git commit -m "Vendor extracted Unit 1 document media"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi

      - name: Upload discovery report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit1-media-ingestion-report
          path: |
            media/discovery/unit1-report.json
            media/discovery/unit1-unresolved.json
            media/vendor/unit1-document-media/manifest.json
            media/vendor/unit1-document-media/content-index.json
          if-no-files-found: warn
