name: Signed Android Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Require stable signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.REALITY_CZECH_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.REALITY_CZECH_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.REALITY_CZECH_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.REALITY_CZECH_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!value:-}" ]; then
              echo "Missing required repository secret: REALITY_CZECH_${value}" >&2
              exit 1
            fi
          done

      - name: Restore stable signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.REALITY_CZECH_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/reality-czech-release.jks"
          test -s "$RUNNER_TEMP/reality-czech-release.jks"

      - name: Pull and validate declared URL media
        run: python3 tools/sync_media.py --skip-unit1-discovery

      - name: Verify committed document media
        run: python3 tools/verify_vendor_media.py

      - name: Verify reviewed URL-media checksums
        run: python3 tools/verify_media_checksums.py

      - name: Materialize document-only lesson images
        run: python3 tools/materialize_vendor_media.py

      - name: Validate structured course content
        run: python3 tools/validate_course.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2
        with:
          gradle-version: "8.11.1"

      - name: Test, lint, and build signed release APK
        env:
          REALITY_CZECH_KEYSTORE_PATH: ${{ runner.temp }}/reality-czech-release.jks
          REALITY_CZECH_KEYSTORE_PASSWORD: ${{ secrets.REALITY_CZECH_KEYSTORE_PASSWORD }}
          REALITY_CZECH_KEY_ALIAS: ${{ secrets.REALITY_CZECH_KEY_ALIAS }}
          REALITY_CZECH_KEY_PASSWORD: ${{ secrets.REALITY_CZECH_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          gradle testDebugUnitTest lintRelease assembleRelease --stacktrace --console=plain
          sha256sum app/build/outputs/apk/release/app-release.apk > app/build/outputs/apk/release/app-release.apk.sha256

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: reality-czech-signed-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk.sha256
          if-no-files-found: error
