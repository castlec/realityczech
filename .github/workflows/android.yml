name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Pull and validate declared URL media
        run: python3 tools/sync_media.py --skip-unit1-discovery

      - name: Verify committed document media
        run: python3 tools/verify_vendor_media.py

      - name: Verify reviewed URL-media checksums
        run: python3 tools/verify_media_checksums.py

      - name: Materialize document-only lesson images
        run: python3 tools/materialize_vendor_media.py

      - name: Upload media reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-sync-report
          path: |
            media/sync-report.json
            media/vendor-materialization-report.json
          if-no-files-found: error

      - name: Validate structured course content
        run: python3 tools/validate_course.py

      - name: Validate integrated curriculum and media
        run: python3 tools/validate_integrated_media.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore stable debug signing key
        id: dev-keystore-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: reality-czech-main-debug-keystore-v1

      - name: Create debug signing key
        if: steps.dev-keystore-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Reality Czech Development,OU=Development,O=Reality Czech,C=US"

      - name: Report signing certificate
        run: keytool -list -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey | grep -E "Alias name|SHA256:"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2
        with:
          gradle-version: "8.11.1"

      - name: Test, lint, and build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle testDebugUnitTest lintDebug assembleDebug --stacktrace --console=plain 2>&1 | tee gradle-build.log

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-build-log
          path: gradle-build.log
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: reality-czech-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
