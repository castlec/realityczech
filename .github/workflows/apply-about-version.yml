name: Apply About Version

on:
  push:
    branches: [main]
    paths:
      - .github/about-version-trigger/**

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: python3 tools/set_about_version.py
      - name: Commit generated About metadata
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/org/realityczech/app/ui/RealityCzechApp.kt
          if git diff --cached --quiet; then
            echo "No About changes needed."
          else
            git commit -m "Display app version in About"
            git push origin HEAD:main
          fi
